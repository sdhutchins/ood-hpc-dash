name: Question
description: Ask a question or request help
title: "[Question]: "
labels: ["question"]
body:
  - type: textarea
    id: question
    attributes:
      label: Question
      description: What would you like to know?
      placeholder: Ask your question here
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any relevant context, code examples, or information
      placeholder: Any additional information that might be helpful
    validations:
      required: false
